<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Inventory System</title>
 
  <!-- Firebase SDK 9+ -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.1.3/firebase-app.js';
    import { getDatabase, ref, onValue } from 'https://www.gstatic.com/firebasejs/9.1.3/firebase-database.js';
 
    // ── Replace these values with your own Firebase project credentials ──
    // Find them in: Firebase Console > Project Settings > Your Apps > SDK setup
    const firebaseConfig = {
      apiKey:            "YOUR_FIREBASE_API_KEY",
      authDomain:        "YOUR_PROJECT.firebaseapp.com",
      databaseURL:       "https://YOUR_PROJECT-default-rtdb.firebaseio.com",
      projectId:         "YOUR_PROJECT_ID",
      storageBucket:     "YOUR_PROJECT.appspot.com",
      messagingSenderId: "YOUR_SENDER_ID",
      appId:             "YOUR_APP_ID"
    };
 
    const app = initializeApp(firebaseConfig);
    const database = getDatabase(app);
 
    const raphaelRef = ref(database, 'raphael/Smart_Scale_Simple');
    const agrimRef   = ref(database, 'agrim/Object_Count');
 
    const combinedData = {};
 
    onValue(raphaelRef, (snapshot) => {
      combinedData['raphael'] = snapshot.val() || {};
      updateTable(combinedData);
    });
 
    onValue(agrimRef, (snapshot) => {
      combinedData['agrim'] = snapshot.val() || {};
      updateTable(combinedData);
    });
 
    function updateTable(data) {
      const inventoryList = document.getElementById('inventoryList');
      inventoryList.innerHTML = '';
 
      if (data['raphael']) {
        for (const item in data['raphael']) {
          if (data['raphael'].hasOwnProperty(item)) {
            const row = document.createElement('tr');
            const nameCell = document.createElement('td');
            nameCell.textContent = item;
            row.appendChild(nameCell);
            const qtyCell = document.createElement('td');
            qtyCell.textContent = data['raphael'][item];
            row.appendChild(qtyCell);
            inventoryList.appendChild(row);
          }
        }
      }
 
      if (data['agrim']) {
        for (const key in data['agrim']) {
          if (data['agrim'].hasOwnProperty(key)) {
            const objectData = data['agrim'][key];
            if (objectData.name && objectData.count !== undefined) {
              const row = document.createElement('tr');
              const nameCell = document.createElement('td');
              nameCell.textContent = objectData.name;
              row.appendChild(nameCell);
              const qtyCell = document.createElement('td');
              qtyCell.textContent = objectData.count;
              row.appendChild(qtyCell);
              inventoryList.appendChild(row);
            }
          }
        }
      }
    }
  </script>
 
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background-color: #f0f8ff;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 50px;
    }
    h1 { color: #4CAF50; text-align: center; margin-bottom: 20px; }
    #inventoryTable {
      width: 60%;
      border-collapse: collapse;
      margin: 20px 0;
      background-color: #ffffff;
      border-radius: 5px;
      box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
    }
    #inventoryTable th, #inventoryTable td {
      padding: 12px; border: 1px solid #ddd; text-align: center;
    }
    #inventoryTable th { background-color: #4CAF50; color: white; }
    tr:nth-child(even) { background-color: #f9f9f9; }
    tr:hover { background-color: #f1f1f1; }
    #inventoryTable td { text-transform: capitalize; }
    #inventoryTable th, td { width: 50%; }
  </style>
</head>
<body>
  <h1>Smart Inventory System</h1>
  <p>Here are the inventory items:</p>
  <table id="inventoryTable">
    <thead>
      <tr><th>Item</th><th>Quantity</th></tr>
    </thead>
    <tbody id="inventoryList"></tbody>
  </table>
</body>
</html>
